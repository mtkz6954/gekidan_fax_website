<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ファニーモンスター図鑑 | 劇団FAX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root { --accent: #a78bfa; --accent2: #6d28d9; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0b0118; overflow: hidden; }
    .pixel { font-family: 'Press Start 2P', monospace; }

    /* ========== スキャンライン ========== */
    .scanlines::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 200;
    }

    /* ========== 画面フラッシュ ========== */
    #flash {
      position: fixed; inset: 0; background: white;
      opacity: 0; pointer-events: none; z-index: 150;
    }
    @keyframes flash-anim {
      0%   { opacity: 0.7; }
      100% { opacity: 0; }
    }
    #flash.flashing { animation: flash-anim 0.35s ease-out forwards; }

    /* ========== 衝撃波リング ========== */
    .shockwave {
      position: absolute; inset: 0; border-radius: 24px;
      border: 2px solid var(--accent);
      opacity: 0; pointer-events: none;
    }
    @keyframes shock {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0;   }
    }
    .shockwave.ring1 { animation: shock 0.6s ease-out forwards; }
    .shockwave.ring2 { animation: shock 0.6s 0.12s ease-out forwards; }
    .shockwave.ring3 { animation: shock 0.6s 0.24s ease-out forwards; }

    /* ========== 背景パーティクル ========== */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--accent); opacity: 0;
    }
    @keyframes float-particle {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      20%  { opacity: 0.6; }
      80%  { opacity: 0.3; }
      100% { transform: translateY(-120px) scale(0.4); opacity: 0; }
    }

    /* ========== 左パネル ========== */
    .list-panel {
      background: linear-gradient(180deg, #110126 0%, #0d011e 100%);
      border-right: 1px solid rgba(139,92,246,0.3);
      z-index: 10; position: relative;
    }
    .list-panel::-webkit-scrollbar { width: 4px; }
    .list-panel::-webkit-scrollbar-track { background: #0d011e; }
    .list-panel::-webkit-scrollbar-thumb { background: #6d28d9; border-radius: 2px; }

    .monster-item {
      transition: all 0.15s ease;
      border-left: 3px solid transparent; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .monster-item::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(109,40,217,0.3), transparent);
      transform: translateX(-100%); transition: transform 0.3s ease;
    }
    .monster-item:hover::before { transform: translateX(0); }
    .monster-item:hover { border-left-color: rgba(139,92,246,0.5); }
    .monster-item.active { border-left-color: #a78bfa; background: rgba(109,40,217,0.25); }
    .monster-item.active .num { color: #a78bfa; }
    .monster-item.active .thumb-wrap { box-shadow: 0 0 12px rgba(167,139,250,0.6); }

    /* ========== 右パネル ========== */
    .detail-panel {
      background: radial-gradient(ellipse at 30% 20%, #1e0a3c 0%, #0b0118 60%);
      position: relative; z-index: 10;
    }

    /* ========== 図鑑番号 ========== */
    .zukan-no {
      font-family: 'Press Start 2P', monospace;
      color: rgba(167,139,250,0.5); letter-spacing: 0.1em;
    }

    /* ========== モンスター名タイプライター ========== */
    #detailName {
      text-shadow: 0 0 40px rgba(167,139,250,0.6);
      min-height: 3rem;
    }
    .typewriter-char {
      display: inline-block; opacity: 0;
      animation: char-appear 0.05s ease forwards;
    }
    @keyframes char-appear {
      from { opacity: 0; transform: translateY(-8px) scale(1.3); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ========== タイプバッジ ========== */
    .type-badge {
      display: inline-block; padding: 4px 14px;
      border-radius: 999px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em; position: relative; overflow: hidden;
    }
    /* シマー */
    .type-badge::after {
      content: ''; position: absolute;
      top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,60% { left: -60%; } 100% { left: 130%; } }

    /* バッジ登場バウンス */
    @keyframes badge-bounce {
      0%   { opacity: 0; transform: scale(0.5); }
      60%  { transform: scale(1.2); }
      80%  { transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    .badge-enter { animation: badge-bounce 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* ========== 画像コンテナ ========== */
    .img-container {
      position: relative; border-radius: 24px;
      background: #ffffff;
    }
    /* グラデボーダー */
    .img-container::before {
      content: ''; position: absolute; inset: -1px; border-radius: 24px;
      background: linear-gradient(135deg, rgba(139,92,246,0.5), rgba(59,130,246,0.3), rgba(236,72,153,0.2));
      z-index: 0;
    }

    /* 浮遊アニメーション（常時） */
    @keyframes float {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      33%     { transform: translateY(-12px) rotate(1deg); }
      66%     { transform: translateY(-6px) rotate(-0.5deg); }
    }
    #detailImg {
      position: relative; z-index: 1;
      mix-blend-mode: multiply;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(109,40,217,0.4));
    }

    /* 画像登場アニメーション */
    @keyframes img-enter {
      0%   { opacity: 0; transform: translateY(40px) scale(0.8); }
      60%  { transform: translateY(-8px) scale(1.05); }
      80%  { transform: translateY(4px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .img-entering { animation: img-enter 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards !important; }

    /* グロー呼吸（常時） */
    @keyframes glow-breathe {
      0%,100% { box-shadow: 0 0 20px rgba(167,139,250,0.2), 0 0 60px rgba(109,40,217,0.1); }
      50%     { box-shadow: 0 0 40px rgba(167,139,250,0.5), 0 0 80px rgba(109,40,217,0.3), 0 0 120px rgba(167,139,250,0.1); }
    }
    .img-container { animation: glow-breathe 3s ease-in-out infinite; }

    /* ========== 説明文フェードイン ========== */
    .desc-line {
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .desc-line.visible { opacity: 1; transform: translateY(0); }

    /* ========== セリフバブル ========== */
    .speech-bubble {
      position: relative;
      background: rgba(139,92,246,0.12);
      border: 1px solid rgba(139,92,246,0.35);
      border-radius: 16px;
    }
    .speech-bubble::before {
      content: '"'; position: absolute; top: -2px; left: 14px;
      font-size: 3rem; color: rgba(139,92,246,0.25); line-height: 1;
    }
    @keyframes quote-in {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    #detailQuote { opacity: 0; }
    #detailQuote.visible { animation: quote-in 0.4s ease forwards; }

    /* ========== グラスカード ========== */
    .glass-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px); border-radius: 16px;
    }

    /* ========== ヘッダー ========== */
    header {
      background: rgba(11,1,24,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,92,246,0.25);
      position: relative; z-index: 20;
    }

    /* ========== PREV/NEXT ボタン ========== */
    .nav-btn {
      position: relative; overflow: hidden;
      padding: 6px 16px; border-radius: 8px;
      border: 1px solid rgba(139,92,246,0.3);
      transition: all 0.2s ease;
    }
    .nav-btn:hover {
      border-color: var(--accent);
      background: rgba(109,40,217,0.2);
      transform: scale(1.05);
      box-shadow: 0 0 16px rgba(167,139,250,0.3);
    }
    .nav-btn:active { transform: scale(0.97); }

    /* ========== 初期表示 ========== */
    @keyframes idle-bounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%     { transform: translateY(-10px) scale(1.05); }
    }
    #emptyIcon { animation: idle-bounce 2.5s ease-in-out infinite; display: inline-block; }

    /* ========== モバイルビュー切り替え ========== */
    @media (max-width: 767px) {
      body { overflow: auto; }
      #emptyState { display: none !important; }

      /* レイアウト：縦積み・全画面 */
      #mainLayout { display: block !important; height: auto !important; }

      /* 左パネル（一覧）：モバイルでは全幅 */
      #monsterList {
        width: 100% !important;
        height: calc(100vh - 48px);
        display: block;
      }
      /* 詳細パネル：デフォルト非表示 */
      #detailPanel {
        position: fixed; inset: 0; top: 48px;
        z-index: 50; overflow-y: auto;
        background: radial-gradient(ellipse at 30% 20%, #1e0a3c 0%, #0b0118 60%);
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      }
      /* 詳細パネル表示時 */
      #detailPanel.mobile-open {
        transform: translateX(0);
      }
      /* 戻るボタン表示 */
      #backBtn { display: flex !important; }
    }

    /* 戻るボタン（PCでは非表示） */
    #backBtn {
      display: none;
      align-items: center; gap: 8px;
      padding: 8px 16px;
      background: rgba(109,40,217,0.2);
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 10px; cursor: pointer;
      transition: all 0.2s ease;
      color: #a78bfa; font-size: 11px;
    }
    #backBtn:hover { background: rgba(109,40,217,0.4); }

    /* モバイルPREV/NEXTは横スワイプ感 */
    @media (max-width: 767px) {
      .nav-btn { padding: 10px 20px; font-size: 8px; }
    }
  </style>
</head>
<body class="scanlines min-h-screen text-white">

<!-- 画面フラッシュ -->
<div id="flash"></div>

<!-- 背景パーティクル -->
<div id="particles"></div>

<!-- ヘッダー -->
<header class="h-12 flex items-center px-4 gap-3">
  <a href="index.html" class="text-purple-400 hover:text-purple-300 text-xs transition-colors">← 劇団FAX</a>
  <span class="text-purple-800">|</span>
  <span class="pixel text-[9px] text-purple-300 tracking-widest">FUNNY MONSTER ZUKAN</span>
  <span class="ml-auto text-[10px] text-purple-600 pixel">v2.0</span>
</header>

<div class="flex" id="mainLayout" style="height: calc(100vh - 48px);">

  <!-- ===== 左パネル（一覧） ===== -->
  <div class="list-panel w-72 shrink-0 overflow-y-auto" id="monsterList">
    <div class="px-3 py-3 border-b border-purple-900/50">
      <p class="pixel text-[8px] text-purple-500 mb-1">MONSTERS</p>
      <p class="text-xs text-purple-400"><span class="font-bold text-purple-300">30</span> 体確認済み</p>
    </div>
  </div>

  <!-- ===== 右パネル（詳細） ===== -->
  <div class="detail-panel flex-1 overflow-y-auto" id="detailPanel">

    <!-- 初期表示 -->
    <div id="emptyState" class="h-full flex flex-col items-center justify-center gap-4 text-center px-8">
      <span id="emptyIcon" class="text-6xl opacity-30">👾</span>
      <p class="pixel text-[10px] text-purple-700 leading-loose">モンスターを<br>選んでください</p>
    </div>

    <!-- 詳細 -->
    <div id="detailContent" class="hidden p-5 md:p-10 max-w-2xl mx-auto">

      <!-- モバイル戻るボタン -->
      <button id="backBtn" onclick="showMobileList()" class="mb-5 pixel text-[9px]">
        ← 一覧に戻る
      </button>

      <!-- 番号・タイプ -->
      <div class="flex items-center justify-between mb-4">
        <span class="zukan-no text-sm" id="detailNo">No.001</span>
        <span class="type-badge" id="detailType"></span>
      </div>

      <!-- 名前 -->
      <h1 class="text-3xl md:text-4xl font-black text-white mb-6" id="detailName"></h1>

      <!-- 画像 -->
      <div class="img-container p-4 mb-8 flex items-center justify-center" style="min-height:280px;">
        <!-- 衝撃波 -->
        <div class="shockwave" id="sw1"></div>
        <div class="shockwave" id="sw2"></div>
        <div class="shockwave" id="sw3"></div>
        <img id="detailImg" src="" alt="" class="max-h-64 w-auto object-contain" />
      </div>

      <!-- 説明文 -->
      <div class="glass-card p-5 mb-4">
        <p class="pixel text-[9px] text-purple-500 mb-3 tracking-widest">// ZUKAN DATA</p>
        <p class="text-sm text-slate-200 leading-7" id="detailDesc"></p>
      </div>

      <!-- セリフ -->
      <div class="speech-bubble px-5 pt-8 pb-4 mb-8">
        <p class="text-base text-purple-200 font-bold" id="detailQuote"></p>
      </div>

      <!-- PREV / NEXT -->
      <div class="flex justify-between">
        <button id="prevBtn" onclick="navigatePrev()" class="nav-btn pixel text-[9px] text-purple-400">← PREV</button>
        <button id="nextBtn" onclick="navigateNext()" class="nav-btn pixel text-[9px] text-purple-400">NEXT →</button>
      </div>

    </div>
  </div>
</div>

<script>
// ===== データ =====
const MONSTERS = [
  { id:1,  file:'IMG_1132.JPG', name:'ギラマスク',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'ピンクと黄緑のコントラストが目を引く、ずんぐりとしたモンスター。顔の半分を覆う黄緑色のマスクが特徴で、いつもニヤリと歯を見せている。実は人見知りで、マスクは恥ずかしさを隠すためのものだという。', quote:'うるさい、見るな。' },
  { id:2,  file:'IMG_1133.JPG', name:'ゴウテン',     type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'頭に乗せた色鮮やかな塔から不思議なエネルギーを発する、にぎやかなモンスター。おでこには宝石が輝き、口からはカラフルな舌を出している。祭りの夜にだけ現れると伝えられている。', quote:'今夜も踊ろうぞ！' },
  { id:3,  file:'IMG_1134.JPG', name:'ハナゴン',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'頭に赤青の風車をつけた緑のベレー帽がトレードマーク。長い牙とモジャモジャの毛が特徴で、手に持った棒でリズムを刻みながら歩く。草むらに潜み、花の蜜を集めて生きている。', quote:'ふんふふん〜♪' },
  { id:4,  file:'IMG_1135.JPG', name:'オウカン',     type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'頭に輝く王冠のような飾りをつけた緑のモンスター。満面の笑みで現れ、会う者すべてを明るい気持ちにさせる。赤い靴がお気に入りで、毎日丁寧に磨いている。', quote:'わはは！今日も最高だ！' },
  { id:5,  file:'IMG_1136.JPG', name:'ナミダン',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'三角形の緑の体に赤いランドセルを背負った、目玉が飛び出るモンスター。常に涙をこぼしており、行く先々を水浸しにしてしまう。本人いわく、うれしくて泣いているらしい。', quote:'うれしくて……うれしくて……' },
  { id:6,  file:'IMG_1137.JPG', name:'ピラニカ',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'ピンクと緑が混じった奇妙な魚型モンスター。大きな口と鋭いヒレが特徴で、深海から地上に飛び出してきたと言われている。機嫌が悪いときは口が90度開く。', quote:'ガブッといくぞ！' },
  { id:7,  file:'IMG_1138.JPG', name:'ネムリン',     type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'青い体に極彩色の模様が描かれた、横向きに浮遊するモンスター。常に半目で眠そうにしているが、実はすべてを見通す能力を持つ。起こすと非常に怒る。', quote:'……（まだ寝てる）' },
  { id:8,  file:'IMG_1139.JPG', name:'オノブシ',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'黄緑色のもふもふした体に、カラフルなお面をつけた戦士モンスター。手に持った斧が自慢で、森の番人として君臨している。見た目より圧倒的に強い。', quote:'この森は俺が守る！' },
  { id:9,  file:'IMG_1140.JPG', name:'バンドン',     type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'緑の帽子にアンテナをつけたオレンジのモンスター。アコーディオンが大好きで、どこへでも持ち歩いている。演奏すると周囲に炎が踊るように揺れる。', quote:'さあ、盛り上がっていこう！' },
  { id:10, file:'IMG_1141.JPG', name:'ハーフロン',   type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'半分が紫のゴースト、半分が緑のロボットという不思議な存在。ティールのスカーフが個性的なアクセント。魂とメカの境界線に住んでいると言われている。', quote:'ぼくは……どっちなんだろう' },
  { id:11, file:'IMG_1142.JPG', name:'ヒラメカ',     type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'赤い丸い体に派手なつば広帽をかぶったモンスター。口の部分の模様が「口」の文字にそっくり。大声でしゃべるのが好きで、声が大きすぎていつも相手が引いてしまう。', quote:'聞けえええ！俺の話を！' },
  { id:12, file:'IMG_1143.JPG', name:'ゾンワン',     type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'薄ピンクの犬型モンスターで、背中にお城が生えており、頭上に紫のドクロが浮かんでいる。何も怖くないふりをしているが、実はびびりの甘えん坊。', quote:'べ、別に怖くないし…' },
  { id:13, file:'IMG_1144.JPG', name:'スルリン',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'細長い青紫のモンスターで、水を切るような流線型の体が特徴。尻尾の先に小さな球がついており、それが唯一の弱点だという。高速で海中を泳ぐ。', quote:'ビューンと行くぜ！' },
  { id:14, file:'IMG_1145.JPG', name:'ハナゾウ',     type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'ピンクの象型モンスター。全身がカラフルなモザイク模様で覆われており、元気よく駆け回る。鼻から音楽を流す能力があり、演奏が始まると周囲が踊り出す。', quote:'パオーン！今日も全力！' },
  { id:15, file:'IMG_1146.JPG', name:'タコシン',     type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'赤い触手の体に緑のベストを着込んだ紳士なモンスター。青い帽子をかぶり、常に謎の液体入りの瓶を携帯している。いつも何かを企んでいる表情を浮かべている。', quote:'ふふふ、計画通りだ' },
  { id:16, file:'IMG_1147.JPG', name:'ニジアーチ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'ティールのアーチ型モンスター。ほぼシンプルな形だが、左側にただ一つ赤い目がある。動き方が予測できず、ぽよんぽよんと不規則に跳ねる。', quote:'どこへでも跳んでいける' },
  { id:17, file:'IMG_1148.JPG', name:'トロロン',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'黄色いとろけた顔に赤い帽子のモンスター。いつもとろとろ溶けながら歩いており、行く先に黄色い液体を垂らす。機嫌はいつも良く、スローペースが心地よい。', quote:'とろっとろ〜♪' },
  { id:18, file:'IMG_1149.JPG', name:'ボクサルー',   type:'格闘',typeColor:'#dc2626', typeBg:'rgba(220,38,38,0.2)',    desc:'青いボクサーモンスター。赤いグローブで世界中の悪を倒すのが夢。額の黄色いラインが必殺技発動のサインで、光り始めたら全力で逃げるべき。', quote:'うおりゃあ！全力で行くぞ！' },
  { id:19, file:'IMG_1150.JPG', name:'ジョーカン',   type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'紫のジョーカー（道化師）型モンスター。パーティーハットを被り、黄緑に光る目が不気味。笑いながら相手を混乱させるのが得意で、後で「冗談」と言い訳する。', quote:'あははは！全部冗談だよ？' },
  { id:20, file:'IMG_1151.JPG', name:'ヨコミ',       type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'黄色いたまご型モンスターで、体の横を向いた一つ目と紫の口が特徴。茶色い下半身は重たく、ちょこちょこした動きでゆっくり移動する。のんびり屋。', quote:'ちょっと待ってよ〜' },
  { id:21, file:'IMG_1152.JPG', name:'ハクサン',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'青と黄色が混じった魚型モンスター。尻尾はカラフルなウロコ模様で、頭から細い触手を3本伸ばしている。深海の探検家として知られ、未発見の海底を日々探索している。', quote:'深いほど楽しいんだ' },
  { id:22, file:'IMG_1153.JPG', name:'ハナウナ',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'紫のウナギ型モンスターで、頭には緑の葉っぱのモヒカン、尻尾はピンクの花が咲いている。くるりと丸まって眠るのが好きで、花が咲いている間は起こさない方がいい。', quote:'花が咲いたら起こして' },
  { id:23, file:'IMG_1154.JPG', name:'カラスオウ',   type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'赤い体に青いくちばし、頭に王冠のような棘を持つ鳥型の王様モンスター。全身に複雑な装飾が施され、目つきが非常に鋭い。自分が最強だと心の底から信じている。', quote:'余の前にひれ伏せ' },
  { id:24, file:'IMG_1155.JPG', name:'ミズカラプス', type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'灰青色の恐竜型モンスター。頭部が幅広く、背中に緑の模様がある。低姿勢で地面を這うように歩き、足裏で地面の振動を感じ取る特殊能力を持つ。', quote:'大地のざわめきが聞こえる' },
  { id:25, file:'IMG_1156.JPG', name:'ツノウマ',     type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'ピンクの馬型モンスターで、頭から赤い長い角が天高く伸びる。背中には水色のウロコ状のひれがある。颯爽と駆け抜ける姿は美しく、見る者を魅了する。', quote:'風になって駆け抜けるわ' },
  { id:26, file:'IMG_1157.JPG', name:'ハートカン',   type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'ハート型の紫ピンクの体を持ち、黄色い目でにやりと笑うモンスター。緑の羽と大きな武器を持ち、愛と暴力が同居している複雑な性格。縞模様のソックスがかわいい。', quote:'愛してるからやっつける！' },
  { id:27, file:'IMG_1158.JPG', name:'ワルラッパ',   type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'大きく丸い紫のモンスターで、縞模様の角が二本生えている。セイウチのような口元と鋭い爪が特徴。どっしり構えてほとんど動かず、動かす必要もないと思っている。', quote:'……（動く気がない）' },
  { id:28, file:'IMG_1159.JPG', name:'キビタン',     type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'黄緑色の奇妙な鳥モンスター。ピンクと緑の翼、赤いくちばしが特徴的。独特のリズムで歩きながら独り言が絶えない。何を言っているのかは誰にもわからない。', quote:'トコトコ、ケッケッ' },
  { id:29, file:'IMG_1160.JPG', name:'フワリン',     type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'パステルカラーの蝶と猫を合わせたようなモンスター。ミントグリーンの顔、カラフルな翼、カールした尻尾が愛らしい。穏やかな性格で、誰とでも仲良くなれる。', quote:'ふわ〜、今日もいい天気♪' },
  { id:30, file:'IMG_1161.JPG', name:'アカトリ',     type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'赤と黄色の鳥モンスター。大きなくちばし、緑の首周り、カラフルな脚が特徴。ダンスが得意で、リズムに乗りながら歩く。踊らない日はないと本人が言っている。', quote:'踊らにゃ損、損！' },
  { id:31, file:'IMG_1162.JPG', name:'パッチウナ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'グレー・ピンク・ティールのパッチワーク模様が美しい魚型モンスター。C字に曲がった体で海流に乗って漂う。縫い目のような柄は生まれつきのもので、触ると不思議な温もりがある。', quote:'縫い目は傷じゃないよ、個性だもの' },
  { id:32, file:'IMG_1163.JPG', name:'ミサイルバード', type:'風', typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',   desc:'頭に一本のユニコーン角を持ち、グリーンのモヒカンが風になびくオレンジの鳥型モンスター。水色の波型の翼で高速飛行し、角で敵を串刺しにする。テンションが高い時に角が光る。', quote:'ヒャッハー！突き刺すぞー！' },
  { id:33, file:'IMG_1164.JPG', name:'ティーレックス', type:'岩', typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'T字形に広がった巨体と背中の緑のトゲが特徴の茶色い恐竜型モンスター。太い腕にはピンクの鋭い爪が備わっており、岩をも砕く。動きは遅いが存在感は圧倒的。', quote:'岩なんてへのカッパだ' },
  { id:34, file:'IMG_1165.JPG', name:'バナンベル',   type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'黄色いバナナのような体に、緑の腕で青いダンベルを持ったモンスター。トレーニングが日課で、毎朝10000回のカール運動を欠かさない。青い目とニッと開いた赤い口がトレードマーク。', quote:'まだまだいけるぞ！もう一回！' },
  { id:35, file:'IMG_1166.JPG', name:'ランバード',   type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'Λ（ラムダ）字型のピンクの体に黄緑の足を持つシンプルなモンスター。黄色いくちばしで鋭い声を出して仲間に知らせる。山の頂上が好きで、いつも高い所にいる。', quote:'ここが私の場所よ' },
  { id:36, file:'IMG_1167.JPG', name:'デンデンゴ',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'茶色と紫のカラーリングのカタツムリ型モンスター。シュールなほど細長い黄色の足と赤い靴がアンバランスで愛らしい。殻の中には謎の液体が入っており、触れると毒にやられる。', quote:'ゆっくりでいいのよ' },
  { id:37, file:'IMG_1168.JPG', name:'ブタコロン',   type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'ピンクの四角い体と螺旋状のくるくる尻尾が可愛らしい豚型モンスター。シンプルな見た目に反してかなりの力持ち。お腹が空くと誰にでも絡んでくる。', quote:'ごはんまだ？ねえまだ？' },
  { id:38, file:'IMG_1169.JPG', name:'ムラサキナガ', type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'細長い楕円形の体が特徴の深海魚型モンスター。青い目とオレンジのひれのコントラストが美しい。光の届かない深海で独自の文明を持っているという噂がある。', quote:'深海には秘密がある' },
  { id:39, file:'IMG_1170.JPG', name:'ロングクビー', type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'長い首と赤い頭部、黄色いあごが特徴のピンクの首長竜型モンスター。首の長さを活かして木の上の実も難なく取れる。穏やかな性格だが首を振り回すと周囲が大惨事になる。', quote:'高い所のも食べられるもん' },
  { id:40, file:'IMG_1171.JPG', name:'ゾウバキ',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'全身が鋸の歯形に刻まれた緑の象型モンスター。ティールのしっぽと口内のピンク色が特徴。見た目は荒々しいが実は植物が大好きで、庭師として名高い。', quote:'この庭は私が守る' },
  { id:41, file:'IMG_1172.JPG', name:'イカハナ',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'紫・ティール・黄のカラフルなイカ型モンスター。花のように広がるひれが美しく、海の女王とも呼ばれる。気分が良い時はひれが大きく広がり、悪い時はしぼむ。', quote:'今日の私は特別きれいでしょ？' },
  { id:42, file:'IMG_1173.JPG', name:'オオハシン',   type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'ピンクの体にオレンジの巨大なくちばしと黄色いブーツが特徴のド派手な鳥型モンスター。くちばしが重すぎて飛べないが、走るのは誰よりも速い。服装センスが独特。', quote:'走ることに特化したもんで' },
  { id:43, file:'IMG_1174.JPG', name:'フォークゴー', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'薄紫のゴースト型モンスター。頭に赤いリボンをつけ、黄色い目で虚ろに笑っている。左手にコマ、右手にフォークを持ち、何かを企んでいる雰囲気。かつては人間だったという説がある。', quote:'さあ、今夜の遊びを始めましょう' },
  { id:44, file:'IMG_1175.JPG', name:'クモマスク',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'緑の全身タイツに水玉グリッドの窓、オレンジのパンツを履いたスパイダーマン型モンスター。手にビーズ鞭を持ち、縦横無尽に壁や天井を走る。正体は謎に包まれている。', quote:'俺の正体？それは秘密だ' },
  { id:45, file:'IMG_1176.JPG', name:'トリプルマウス', type:'霊', typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)', desc:'青い頭部に3つの口を持ち、緑のドレスとオレンジのブーツを履いたモンスター。それぞれの口から異なる言語を話すため、会話が非常にカオスになる。一番上の口が本音を言う。', quote:'うん/そう/ちがう（全部同時）' },
  { id:46, file:'IMG_1177.JPG', name:'ソンブレロン', type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'緑とオレンジのコントラストが鮮やかなダンサー型モンスター。ソンブレロのような帽子をかぶり、飛び蹴りポーズでいつも登場する。炎をまとった蹴りは避けようがない。', quote:'オレの蹴りを食らえ！' },
  { id:47, file:'IMG_1178.JPG', name:'スラリーノ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'細長い水色の体を持ち、4本の小さな足でちょこんと座るモンスター。表情がいつも無表情で何を考えているか全くわからない。怒っているのか眠いのか誰にもわからない。', quote:'……（無言）' },
  { id:48, file:'IMG_1179.JPG', name:'ガバイオ',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'大きなC字の体に鋭い牙が並ぶ黄色い魚型モンスター。オレンジとピンクのひれが鮮やかで、水中では圧倒的な速度を誇る。かじることが生きがいで何でもかじる。', quote:'ガブッ！何でもかじるぞ！' },
  { id:49, file:'IMG_1180.JPG', name:'ヤジルシ',     type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'矢印のような体型が特徴の、オレンジ・緑・茶色が混じった独特の体型モンスター。片足だけが異様に長く、常に何かを指し示しているような姿勢をとる。行き先を知っているかのようだ。', quote:'この先だよ（知らないけど）' },
  { id:50, file:'IMG_1181.JPG', name:'ブロックロボ', type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'ずっしりとした灰色のブロック体型ロボット型モンスター。顔面の黄色とピンクのシンボルマークと格子状のオレンジの口が特徴。重すぎて自分で動くのが億劫らしい。', quote:'うごくのがめんどう…' },
  { id:51, file:'IMG_1182.JPG', name:'ミカヅキン',   type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'三日月のような黄緑の体型にピンクの目とオレンジの鼻点を持つシンプルなモンスター。夜になると体が輝き始め、月明かりの代わりになる。笑うと目玉が月になる。', quote:'夜道を照らすよ！' },
  { id:52, file:'IMG_1183.JPG', name:'メカワン',     type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'オレンジの犬型モンスター。紫のとさかと青いメカニカルなスプリング顎が独特のデザイン。かみつく力は機械仕掛けのバネで増幅されており、岩も砕く。吠えるたびに炎が出る。', quote:'ワン！（バキッ）' },
  { id:53, file:'IMG_1184.JPG', name:'カイガラモン', type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'ベージュの三角形の体に茶色の貝殻型の大きな傘を持つモンスター。ピンクの髪と灰色の曲がった腕と足が特徴。雨の日しか外に出ない。傘が気分によって形を変える。', quote:'今日は雨だから最高' },
  { id:54, file:'IMG_1185.JPG', name:'タンポポン',   type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'ピンクのペンギン体型に細長い首と紫の丸い頭を持つモンスター。腕に付いた黄緑の丸いアクセサリーが目印。首が伸び縮みし、遠くのものを素早く食べる技を持つ。', quote:'のびのびいきましょう' },
  { id:55, file:'IMG_1186.JPG', name:'オウコクキング', type:'霊', typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)', desc:'青紫のW字型の体に黄金の王冠をかぶり、オレンジの一つ目で世界を睥睨するモンスター。口にはピンクの舌を垂らし、いつもニヤリと笑っている。自分こそが全宇宙の王だと信じている。', quote:'この星は我のものだ' },
  { id:56, file:'IMG_1187.JPG', name:'スライメン',   type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'レインボーの髪飾りをつけたピンクのスライム型モンスター。青い剣を右手に持ち、体の粒子を周囲に飛ばして攻撃する。笑顔が可愛いのに戦闘力は最凶クラス。', quote:'えっへへ〜やっつけちゃうよ！' },
  { id:57, file:'IMG_1188.JPG', name:'クリスマシン', type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'赤い帽子に柊の葉を飾り、黄緑の体でタバコをくわえたワルそうなモンスター。緑の靴を履いて颯爽と歩く姿は不思議と決まっている。クリスマスに現れて悪事を働く。', quote:'サンタ？知らんな' },
  { id:58, file:'IMG_1189.JPG', name:'モザイクリュウ', type:'岩', typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'全身が緑・茶・オレンジのモザイクタイルのような模様で覆われた恐竜型モンスター。青い目が印象的で、口を開けると赤いノコギリ状の歯が並ぶ。自分の模様は一枚一枚違う意味を持つと主張している。', quote:'この模様、全部暗号なんだ' },
  { id:59, file:'IMG_1190.JPG', name:'ヒョウタンゼリー', type:'毒', typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)', desc:'黄色の瓢箪型の体にティールのアメーバ状の裾をまとったモンスター。頭から伸びる紫の触角2本がアンテナのように機能し、遠くの危険を察知する。中身はどろどろの毒液。', quote:'触れた？やばいよ' },
  { id:60, file:'IMG_1191.JPG', name:'カボチャ王',   type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'オレンジのずんぐりとしたゴースト型モンスターで、金の王冠をかぶっている。白目に黒い瞳、黄色い足が特徴。この世の王を名乗っているが誰にも本気にされていない。', quote:'余が王だと言っているだろ！' },
  { id:61, file:'IMG_1192.JPG', name:'ストラゴン',   type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'青い細長い体に一つの大きな目とピンクの縦長スリットの口を持つモンスター。緑のショートパンツがおしゃれ。体が細いため風の影響を受けやすく、強風の日は大変なことになる。', quote:'また飛ばされた…' },
  { id:62, file:'IMG_1193.JPG', name:'パッキング竜', type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'オレンジの恐竜型モンスターで、背中に緑のリュックを背負い、カラフルな書類を抱えている。黄色のとさかが目印。いつも仕事が忙しく、走りながら資料を読んでいる。', quote:'締め切りには間に合う！' },
  { id:63, file:'IMG_1194.JPG', name:'マイヒメウサ', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'紫の兎型モンスター。赤い仮面をつけ、縞々スカートを履き、カラフルな扇子をひらひらさせながら踊る。舞踊の達人で、その踊りには観る者を催眠状態にする力がある。', quote:'さあ、一緒に踊りましょう' },
  { id:64, file:'IMG_1195.JPG', name:'カクテルン',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'紫のずんぐりとした体にカラフルな縞模様の角が二本生えたモンスター。カラフルな体は毒を持つ生き物の警告色。見た目に惑わされてはいけない。意外と寂しがり屋。', quote:'ちかづくな（でも友達ほしい）' },
  { id:65, file:'IMG_1196.JPG', name:'イヌトリ',     type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'ピンクの犬の頭に黄緑の体、青い角、そしてオレンジの水かき足を持つキメラ型モンスター。犬なのか鳥なのか自分でもわかっていない。風に乗ってぴょこぴょこ跳ねて移動する。', quote:'僕って何なんだろう…' },
  { id:66, file:'IMG_1197.JPG', name:'デカグチ',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'緑の体から巨大な口がはみ出し、青×緑のガラス玉のような目玉が飛び出たモンスター。口の中は黄色く、何でもかんでも食べてしまう。食欲が止まらないが体重は増えない。', quote:'もっと食う！全部食う！' },
  { id:67, file:'IMG_1198.JPG', name:'カボクマ',     type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'オレンジの熊型モンスター。顔はかぼちゃのように丸く、三角の目と鼻を持ち、水色の前歯が2本生えている。頭に緑の星形の飾り。ハロウィンの夜に子供たちのお菓子を集める。', quote:'トリックオアトリート（本気）' },
  { id:68, file:'IMG_1199.JPG', name:'アンコウン',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'緑色の深海魚型モンスター。頭から黄色い竿を伸ばし、先端に赤い小魚型のルアーを吊るしている。その光で獲物を誘い込む。釣り師に例えられ、釣られるまで絶対に動かない。', quote:'来い……もっと近くに……' },
  { id:69, file:'IMG_1200.JPG', name:'テラノスーツ', type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'赤い恐竜の頭に黄色いシャツと緑のズボン、オレンジのベルトとポケットをつけた着こなしの良い恐竜モンスター。三角の鋭い歯を持ちながらも、ビジネスマンとして社会に溶け込もうとしている。', quote:'今日もアポは取った' },
  { id:70, file:'IMG_1201.JPG', name:'ハナハナ',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'黄・赤・青・ピンクのカラフルな花びら状の顔を持ち、緑の茎と葉、茶色の根っこで立つ植物型モンスター。自分が植物か動物か判断がつかない。花の香りで敵を眠らせる。', quote:'私の香り、どう？好き？' },
  { id:71, file:'IMG_1202.JPG', name:'オオクチバ',   type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'全身が大きな赤い口と青い舌だけで構成されたモンスター。黄金の縁に黄色のウェブ状の足が付いている。食べること以外に興味がなく、会話も全て食事の話になる。', quote:'それ食える？食えない？' },
  { id:72, file:'IMG_1203.JPG', name:'ダッシュウマ', type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'水色の馬型モンスター。緑色の帽子にピンク×黄色のバンドを締め、茶色のズボンを履いている。風のように速く走り、走ることで頭の中が整理されると言っている。', quote:'走れば全部解決する！' },
  { id:73, file:'IMG_1204.JPG', name:'アカメガエル', type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'緑の体に大きな赤い目と黄色い虹彩を持つカエル型モンスター。頭に小さな角がある。目が大きすぎて視野は360度だが、前だけは見えない。強力な毒を皮膚から分泌する。', quote:'あれ？君どこにいる？' },
  { id:74, file:'IMG_1205.JPG', name:'ヒラワニ',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'平べったく横に長い黄緑のワニ型モンスター。背中に青いトゲが並び、四角い頭と短い足が特徴。水面すれすれを這うように移動し、気づいたときにはすでに食べられている。', quote:'気づかなかった？そりゃそうだ' },
  { id:75, file:'IMG_1206.JPG', name:'タンクヘッド', type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'紫と黄色の横向きの顔とオレンジ×緑の戦車状の台座が合体したモンスター。赤い目と緑のグリッドの口がついている。台座から砲弾を発射するが、自分の顔が邪魔で狙いが定まらない。', quote:'邪魔なのは自分の顔だ…' },
  { id:76, file:'IMG_1207.JPG', name:'ランプバード', type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'黄色い電球型の頭と青いトゲ、赤い体、紫×青のグラデーション羽を持つ鳥型モンスター。頭が光る時は知恵が働いているサインで、アイデアが浮かぶと羽が広がる。', quote:'ひらめいた！これだ！' },
  { id:77, file:'IMG_1208.JPG', name:'サメカスベ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'青と紫の体にくちばし状の黄色い突起、オレンジ×黄色のフィンを持つ謎の魚型モンスター。泳ぎ方が独特で、体をくるくる回転させながら進む。深海で発光する。', quote:'回りながら行くのが流儀' },
  { id:78, file:'IMG_1209.JPG', name:'ツノヅラ',     type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'ピンクの四角い頭に赤×青の眼帯模様が二つ並び、黄色の角が2本生えた茶色い体のモンスター。眼帯に秘密のシンボルが描かれており、闇の組織のマークだという噂がある。', quote:'知っているが教えない' },
  { id:79, file:'IMG_1210.JPG', name:'ヒマワリング', type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'紫・ピンク・黄のグラデーションのひまわり型の顔に、鱗模様の翼と青い細い足を持つモンスター。太陽の方向を常に向き続け、どんな角度でもひまわり顔をキープする。', quote:'太陽が好き、ずっと見てる' },
  { id:80, file:'IMG_1211.JPG', name:'ビッグフェイス', type:'霊', typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)', desc:'ピンクの異様に大きな頭と赤い丸い目、青の管状の突起を持つ縦長のモンスター。頭の重さで前に倒れないのが不思議。一つの目でしか見えないが視力は6.0ある。', quote:'よく見えてるよ（片目でも）' },
  { id:81, file:'IMG_1212.JPG', name:'ハコハシ',     type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'赤い体に青のモヒカン、そして体と同じ長さの黄色い超ロングくちばしを持つ鳥型モンスター。くちばしの先端に青い箱を紐でつなげて持ち歩く。箱の中身は誰も知らない。', quote:'箱の中身は教えない' },
  { id:82, file:'IMG_1213.JPG', name:'ジェントルグリーン', type:'草', typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)', desc:'黄緑の大きな丸い頭にオレンジ×ピンクの目、赤い蝶ネクタイを締めて杖をついた紳士なモンスター。杖は飾りではなく武器で、振り回すと嵐を呼ぶ。', quote:'紳士とは強さを内に秘めるもの' },
  { id:83, file:'IMG_1214.JPG', name:'ヨンテロボ',   type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'青いロボット型モンスターで、頭には青・緑・赤の帽子を3枚重ねにのせ、黄色いアーチ状の4本腕が体から伸びる。腕がありすぎて何をすべきかいつも混乱している。', quote:'どの手で握手すれば…' },
  { id:84, file:'IMG_1215.JPG', name:'ヒロガオ',     type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'横に広がったピンクの頭部と青い大きな口、黄緑のヘアピン、オレンジの胴体を持つモンスター。頭が体より3倍ほど大きい。笑うと口が頭幅いっぱいに開く。', quote:'えへへ（口が全開）' },
  { id:85, file:'IMG_1216.JPG', name:'ヤギビン',     type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'薄緑の山羊型モンスターで、紫と白の渦巻き模様の角が一本生えている。水色のシャツと紫のズボンという洒落たいでたち。角を回すと竜巻を起こせる。', quote:'この角、回すと面白いことになるぞ' },
  { id:86, file:'IMG_1217.JPG', name:'ジコアイウサ', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'茶色の兎型モンスターで、カラフルな縞模様の角を持ち、自分自身を優しく抱きしめているポーズがトレードマーク。自己肯定感が宇宙一高く、常に自分を褒め続けている。', quote:'私って最高！大好き！' },
  { id:87, file:'IMG_1218.JPG', name:'デコキング',   type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'緑の恐竜の頭部のみのモンスターで、背中に赤いヒレ、頭頂に王冠のような黄色い突起が生えている。体がないのにどうやって生きているのか誰も解明できていない。', quote:'体なんていらない' },
  { id:88, file:'IMG_1219.JPG', name:'モコフトシ',   type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'紺の丸い体の上に黄色いもこもこした頭が乗り、ピンクの鼻とオレンジのポケットが目印の可愛いモンスター。夜にだけ活動し、暗闇の中でも黄色い頭が光るので隠れられない。', quote:'隠れてるのに見つかっちゃう' },
  { id:89, file:'IMG_1220.JPG', name:'ゲリゲタン',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'茶色のキノコ型の頭を持ち、黄緑の歯が放射状に並んだ大口から緑の舌を出したモンスター。右手に扇子を持ち、毒の胞子をまき散らしながら舞い踊る。優雅だが危険。', quote:'毒の舞い、いかがでしょう' },
  { id:90, file:'IMG_1221.JPG', name:'スミレニャン', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'紫の猫型モンスターで、青いスカーフをまとって背中を丸め、花を優しく口元に当てているポーズが印象的。何かを考え込んでいる雰囲気があり、詩人気質な性格。', quote:'この花の色みたいに生きたい' },
  { id:91, file:'IMG_1222.JPG', name:'ボールスネーク', type:'岩', typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'灰色のロボット上半身と茶色のヘビ下半身に、黄色い顔のボールが繋がった複合型モンスター。ロボット部分は喋れないが、ボール部分が勝手に喋り続けて周囲を困らせる。', quote:'あのさあ（ロボ）それはさあ（ボール）' },
  { id:92, file:'IMG_1223.JPG', name:'ネオンドラゴ', type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'黄緑とティールの縞模様の体を持つドラゴン型モンスター。ピンクとオレンジの縞角が頭上に輝き、電流を放電する。夜に体が蛍光色に発光し、生きるネオンとも呼ばれる。', quote:'光れ！俺の角！' },
  { id:93, file:'IMG_1224.JPG', name:'ヘビウイング', type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'S字に曲がった黄色いヘビ型の体に、緑とオレンジのグラデーション翼を持つ空を飛ぶモンスター。赤い目が鋭く、翼をはためかすだけで嵐を呼ぶ。', quote:'空も地もどちらも俺のもの' },
  { id:94, file:'IMG_1225.JPG', name:'トカゲライダー', type:'草', typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',  desc:'緑と赤と黄のカラフルなトカゲ型モンスター。青いトゲ付きの足で地面を走り、茶色い舌を伸ばしてコミュニケーションを取る。実は方向音痴で何度も同じ場所をぐるぐる回る。', quote:'ここ通った気がする（2時間目）' },
  { id:95, file:'IMG_1226.JPG', name:'ムギワラウオ', type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'水色の体に茶色い麦わら帽子、黄色のスイムスーツを着た魚型モンスター。笑顔の顔がついた棒を持って歩く。海辺の農夫として知られ、海藻を丹精込めて育てている。', quote:'今年の昆布は絶品だよ' },
  { id:96, file:'IMG_1227.JPG', name:'グリーンチーク', type:'炎', typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',  desc:'オレンジの巨大な頭部に緑のほっぺ、ジグザグ模様の口を持つ鳥型モンスター。大きな緑の尾羽が体を覆い、歩くときにゆさゆさと揺れる。怒ると尾羽が膨らむ。', quote:'怒ってないよ（尾羽膨らみ中）' },
  { id:97, file:'IMG_1228.JPG', name:'ホシマツリ',   type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'ティールの星形の体を持ち、棒の先に三角バナーの旗を付けた明るいモンスター。お祭りが大好きで、どこにでも旗を立てて祝祭ムードを作り出す。見た目は旗振り役そのもの。', quote:'祭だ！全員集合！' },
  { id:98, file:'IMG_1229.JPG', name:'ハナクジャク', type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'ピンクの孔雀の羽根のように広がる花扇形の頭を持つモンスター。オレンジ×黄の細長い首と体、細い足でダンスを踊る。広げた頭の模様が見る者を魅了し、動けなくさせる。', quote:'見惚れた？そりゃそうよ' },
  { id:99,  file:'IMG_1562.JPG', name:'パッチバード',    type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'金色の鳥型モンスターで、胸に緑と赤のデジタル模様の四角いパッチが貼り付けてある。ピンクの短いくちばしで鋭い声を出す。パッチは手術痕ではなく生まれつきらしい。', quote:'このパッチはおしゃれだから' },
  { id:100, file:'IMG_1563.JPG', name:'ミドリハシ',    type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'ピンクの三角形の魚頭に緑の細いくちばしを持ち、後頭部から紫とティールの三つ編み状の模様が垂れているモンスター。海面から顔だけ出してのんびり漂う。髪のお手入れが日課。', quote:'髪はいつもきれいに' },
  { id:101, file:'IMG_1564.JPG', name:'ノッポイヤー',  type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'黄緑の体にピンクの巨大な耳と頭を持つモンスター。紫の舌とティールのヒレが特徴的。耳が大きすぎてすべての音が聞こえてしまい、いつも頭が痛そうにしている。', quote:'全部聞こえちゃうんだよなあ' },
  { id:102, file:'IMG_1565.JPG', name:'ハニードラ',    type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'ベージュと紫を基調としたずんぐりした魚型モンスター。頭に色とりどりのトゲが生え、ピンクの眼で睨みつける。背中の黒いヒレで空気を読んでいる（読みすぎて疲弊している）。', quote:'空気読みすぎて疲れた' },
  { id:103, file:'IMG_1566.JPG', name:'クチャビラ',    type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'黄緑の小さな頭と水色の巨大な台形型体が合体したモンスター。グレーの格子歯を持つ大きな口が印象的。体の大きさに頭がついていっておらず、バランス感覚がゼロ。', quote:'体が言うことを聞かない' },
  { id:104, file:'IMG_1567.JPG', name:'ドブゴースト',  type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'くすんだオリーブグリーンの半透明なゴースト型モンスター。ティールの目がぼんやり光り、マゼンタと紺色の大きな口が特徴。古いお城に住み着いており、訪問者を驚かせるのが趣味。', quote:'うらめしや…（趣味）' },
  { id:105, file:'IMG_1568.JPG', name:'ツバメオウ',    type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'紺と薄紫のグラデーションの鳥型モンスター。マゼンタの胸飾りと薄紫の水かき足が特徴。夜の闇に溶け込んで飛行するため、暗闇でしか会えない幻の鳥と呼ばれている。', quote:'夜だけが俺の時間だ' },
  { id:106, file:'IMG_1569.JPG', name:'ドンドラ',      type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'黄土色の大きくずんぐりした恐竜型モンスター。ピンクの目と紫の格子状の歯が特徴で、黄緑と赤の尻尾がついている。体が重すぎて自分では起き上がれない。', quote:'誰か起こしてくれ…' },
  { id:107, file:'IMG_1570.JPG', name:'ダキアッテ',    type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'紫の体を緑の腕で包むように縮まった恐竜型モンスター。黄緑の卵型の目でじっと見つめてくる。寒がりで、自分を抱きしめていないと体温が下がってしまうという特殊な体質を持つ。', quote:'さむい…（32℃でも）' },
  { id:108, file:'IMG_1571.JPG', name:'フレイムサウル', type:'炎', typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',   desc:'濃緑の体にオレンジと赤の炎のようなマントを纏い、黄緑の鋭い角を持つ恐竜型モンスター。マントは炎から生まれた特殊素材で燃えない。背後から現れてマントを広げると敵は逃げ出す。', quote:'このマント、燃えないんだよね' },
  { id:109, file:'IMG_1572.JPG', name:'プロペラロン',  type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'オレンジとマゼンタの三枚羽のプロペラ型モンスター。赤い中央の核から回転エネルギーを放出し、秒速200回転の猛スピードで回り続ける。止まると気絶してしまうらしい。', quote:'止まれないんだよ（物理的に）' },
  { id:110, file:'IMG_1573.JPG', name:'パステルレックス', type:'霊', typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)', desc:'ピンクと薄紫のパステルカラーが独特のTレックス型モンスター。緑の四角いくちばし状の口が特徴。柔らかいカラーとは裏腹に霊的な力を持ち、幽霊を引き寄せてしまう体質。', quote:'またついてきてる…（幽霊が）' },
  { id:111, file:'IMG_1574.JPG', name:'ツートングリーン', type:'水', typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)', desc:'ミントグリーンとティールの2色の緑が美しい魚型モンスター。体がY字型に分かれており、ピンクの細い舌を出して泳ぐ。2つの体が別々の意思を持っており、よく口喧嘩している。', quote:'そっちじゃない！（内部会議）' },
  { id:112, file:'IMG_1575.JPG', name:'カマゾウ',      type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'淡いピンクの細長い鎌状の体を持つモンスター。体の中腹に緑の丸い目と青い2本のひれが生えている。風に乗って縦回転しながら飛び、近づくものをすべて切り裂く。', quote:'切れ味は保証する' },
  { id:113, file:'IMG_1576.JPG', name:'ニノジモン',    type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'「2」の字に曲がった赤い体に黄緑の目と緑の牙を持つモンスター。体の形通り「2番目」が好きで、1番になることをあえて避けている。実力は最強クラスだが目立ちたくない。', quote:'2番でいい、1番はやだ' },
  { id:114, file:'IMG_1577.JPG', name:'フラワーヘッド', type:'草', typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',   desc:'ティールのふっくりとした丸い体の頭頂にカラフルな花びら状の冠飾りをつけたモンスター。ピンクの一つ目と舌を出した口、赤いブーツが特徴。牧草地で踊り続けるのが日課。', quote:'踊れば何でも解決！' },
  { id:115, file:'IMG_1578.JPG', name:'チラハーフ',    type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'ピンクのミノムシ型のモンスターで、黄色い顔に赤い目と格子状の歯が特徴的。体の半分が見えており、まるで幽霊のようにするりと壁を通り抜ける。どこから来てどこへ行くかは謎。', quote:'見えてるけど半分だから' },
  { id:116, file:'IMG_1579.JPG', name:'フワラネコ',    type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'ピンクの体にオレンジの大きなふわふわの尻尾を持つ猫型モンスター。ティールの大きな目が愛らしく、背中にはさりげなくハートマークが描かれている。炎の尻尾は撫でると温かい。', quote:'尻尾は触っていいよ' },
  { id:117, file:'IMG_1580.JPG', name:'フトクビ',      type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'カーキ色のずんぐりした体と異様に長いくちばし型の頭部を持つモンスター。青い目と青いラインのノコギリ歯が印象的。くちばしで岩を削って食べる習性がある。', quote:'岩の方が美味しい' },
  { id:118, file:'IMG_1581.JPG', name:'ゴールドビル', type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'青い体と黄金色の巨大なくちばしが輝く鳥型モンスター。黄色い王冠状の突起を頭に持ち、黄色い足と水色のアクセント翼が特徴。くちばしが光って地面に絵を描く習性がある。', quote:'今日の作品はこれだ（地面に書く）' },
  { id:119, file:'IMG_1582.JPG', name:'パズルザウルス', type:'草', typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',  desc:'黄色い恐竜型モンスターで、赤シャツ・紫ベルト・茶色ズボンを着こなし、カラフルなルービックキューブを食べようとしている。緑のとさかと緑の目が目印。パズルを解くより食べた方が早いと考えている。', quote:'解くより食った方が早い' },
  { id:120, file:'IMG_1583.JPG', name:'グレーホース', type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'紫とグレーの2色の体を持つ奇妙な四足歩行モンスター。ティールの鼻と赤い装飾、緑のグリッドの口が特徴。前足がなく、後ろ足と尻尾だけで器用に歩く。夜明け前に消える。', quote:'夜が明ける前に行く' },
  { id:121, file:'IMG_1584.JPG', name:'トリアシトリ', type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'赤い大きな体に細い3本足を持つ鳥型モンスター。黄色いくちばしとオレンジのとさか、胸の黄色い模様が目印。3本足でトリッキーな走り方をする。足の細さと体の大きさが不釣り合い。', quote:'3本あった方が安定するんだよ' },
  { id:122, file:'IMG_1585.JPG', name:'ネオンザメ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'赤と黄色のコントラストが鮮烈な頭部のみのモンスター。ティールの目とティールの水玉模様、そして紫の格子状の歯が特徴。頭だけで泳ぎ、体は別の場所にあると主張している。', quote:'体は今出張中' },
  { id:123, file:'IMG_1586.JPG', name:'シマオッポ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'水色の体に紫と緑の縞模様のしっぽを持つ魚型モンスター。赤の虹彩の目が水中で光る。しっぽの縞模様は季節によって変化し、春は緑が多く、冬は紫が増える。', quote:'今の縞、秋バージョンだよ' },
  { id:124, file:'IMG_1587.JPG', name:'タコソウ',     type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'黄色の細長いタコ型モンスターで、緑の模様の丸い口と小さな翼状のひれを持つ。腕が多すぎて何をすべきかいつも混乱しているが、腕の1本1本に意思があり勝手に動く。', quote:'左腕！お前は何をしてる！' },
  { id:125, file:'IMG_1588.JPG', name:'ダシュタン',   type:'風',  typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)',    desc:'黄土色の平べったい体を持ち、緑と灰の目と口を持つ全力疾走モンスター。常に走っており、止まる方法を忘れてしまった。誰かと会うたびに高速でぶつかっていく。', quote:'止まり方がわからない（10年目）' },
  { id:126, file:'IMG_1589.JPG', name:'ラベンダーバード', type:'風', typeColor:'#0891b2', typeBg:'rgba(8,145,178,0.2)', desc:'水色の細長い体に薄紫のリボン状の羽を持つ上品な鳥型モンスター。金のくちばしと紫の目が優雅。ラベンダー畑を住処とし、羽ばたくたびに紫の香りが漂う。', quote:'この香り、心が落ち着くでしょ' },
  { id:127, file:'IMG_1590.JPG', name:'ミニトライ',   type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'マゼンタの三角形の体と緑の大きなくちばし、水色の点々の目を持つシンプルな鳥型モンスター。シンプルな見た目と違い、炎を200m先まで噴射する。目つきがどこか不安そう。', quote:'あの…大丈夫ですか？（炎を噴きながら）' },
  { id:128, file:'IMG_1591.JPG', name:'ウズグルグル', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'ピンク・黄色・ティールが渦を巻くように混じったモンスター。青い目と小さなピンクのツメを持ち、体がぐるぐると回転することで移動する。見ていると目が回る。', quote:'目が回らない？私はとっくに慣れた' },
  { id:129, file:'IMG_1592.JPG', name:'Uハシドリ',    type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'サーモンピンクの体に黄緑のU字型くちばし、緑の波型の毛を持つ馬と鳥の合いの子モンスター。薄紫の目がぼんやりしており、いつも夢見がちな表情をしている。', quote:'なんかいいことありそう' },
  { id:130, file:'IMG_1593.JPG', name:'ダーク四角',   type:'闇',  typeColor:'#4f46e5', typeBg:'rgba(79,70,229,0.2)',    desc:'茶紫のブロック型の体に縦のティールと紺の巨大な牙を持ち、カラフルな格子の口が叫んでいるモンスター。体の横からも翼状のパーツが生えており、飛べそうだが飛ばない。', quote:'飛べるけど飛ばない主義' },
  { id:131, file:'IMG_1594.JPG', name:'タマフクロ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'ピンクの細長い首と青い水風船のように膨らんだ体を持つ首長竜型モンスター。緑のとさかと茶×緑の縞模様のしっぽが特徴。体を膨らませると水中に浮かぶ浮き輪になる。', quote:'乗っていいよ（膨らむ）' },
  { id:132, file:'IMG_1595.JPG', name:'ホウキワニ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'水色の顔に青い体、紫の舌を持つワニ型モンスター。両手にホウキを持ち、常に何かを掃き続けている。掃除が趣味で、きれいになると感動して泣く。', quote:'ここはきれいになった！（泣く）' },
  { id:133, file:'IMG_1596.JPG', name:'レインボーフィッシュ', type:'光', typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)', desc:'マゼンタの魚型の体に紫・緑・黄のカラフルな縞模様の翼を持つモンスター。水色の細い足で地面も歩ける両用タイプ。翼が光を反射してオーロラのような光を放つ。', quote:'空でも海でも私の舞台' },
  { id:134, file:'IMG_1597.JPG', name:'ポップアイ',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'黄緑のずんぐりした体から茎付きの目玉が飛び出ているモンスター。鼻がオレンジ色で、ピンクの大きな口が開いている。驚いた時に目玉が2倍の長さに伸びる。', quote:'驚いた！（目玉が伸びる）' },
  { id:135, file:'IMG_1598.JPG', name:'ランラングリン', type:'草', typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',  desc:'緑と紫の斑模様の体に白い四角い目を持つ元気なモンスター。常に全力疾走していて、紫の手足の先が速度でぶれている。走るのが好きすぎて止まれないが、止まりたくもない。', quote:'走るのって最高だろ！' },
  { id:136, file:'IMG_1599.JPG', name:'アボガド兎',   type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'水色の頭部に黄緑の大きな耳を持ち、格子状の緑の歯が特徴の兎型モンスター。全身がアボカドのような色合いで、食べられそうだと言われるたびに怒る。', quote:'食べ物じゃない！（激怒）' },
  { id:137, file:'IMG_1600.JPG', name:'ボールシッポン', type:'霊', typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)', desc:'紫の頭にピンク・緑・黄のジグザグ模様の帽子をかぶり、ピンクの細い体としっぽの先にピンクのボールがついた小さな恐竜型モンスター。名前を呼ばれると全力でぴょんと跳んで逃げる。', quote:'呼ばれた？（ぴょん）' },
  { id:138, file:'IMG_1601.JPG', name:'カブリマゼン', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'マゼンタのアメーバ型の体に、紫の巨大な頭部が覆いかぶさったゴースト型モンスター。口の中には黄・ピンク・紺の格子歯と赤い玉のような舌がある。内側から声だけが聞こえてくる。', quote:'うわー（内部から）' },
  { id:139, file:'IMG_1602.JPG', name:'サスペンベア', type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'ピンクのずんぐりした体に水色の一つ目、水色のシャツ、黄緑のサスペンダー、グレーのズボンという妙にこなれたコーディネートのモンスター。一つ目なのにファッション誌は毎号読む。', quote:'この格好、わりと気に入ってる' },
  { id:140, file:'IMG_1603.JPG', name:'タレハナン',   type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'オレンジ色のどろっとした体から黄色い長い突起が垂れ下がり、緑の一つ目が覗くモンスター。自分の体がどこからどこまでかを誰も把握できていない。本人も把握していない。', quote:'これ鼻じゃないよ（怒）' },
  { id:141, file:'IMG_1604.JPG', name:'サンメガタ',   type:'毒',  typeColor:'#7c3aed', typeBg:'rgba(124,58,237,0.25)',  desc:'黄色のアメーバ型の体に3つの目（それぞれ青・紫・赤のまつ毛付き）と、ピンク×紫の大きな口、青い牙を持つモンスター。3つの目は全部ちがう色のものが見えており、いつも意見が割れる。', quote:'3つ見えてるよ（全部ちがう色で）' },
  { id:142, file:'IMG_1605.JPG', name:'ゴーグルスワン', type:'岩', typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'カーキ色のS字の首に紫の体、頭にゴーグルをかけ、赤茶色のくちばしが上下に2本生えた鳥型モンスター。ゴーグルをいつもかけているが泳いだことは一度もない。聞かれると話をそらす。', quote:'泳いだことはない（ゴーグルつけたまま）' },
  { id:143, file:'IMG_1606.JPG', name:'シミアタマ',   type:'水',  typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',    desc:'薄水色の四角い頭に緑のシミ模様と灰色の一つ目、小さなピンクの鼻点を持ち、マゼンタの足で立つモンスター。シミを取ろうとした者を全員撃退してきた。シミに愛着がある。', quote:'このシミ、取れないんだよね' },
  { id:144, file:'IMG_1607.JPG', name:'ハンマーウン', type:'岩',  typeColor:'#78716c', typeBg:'rgba(120,113,108,0.25)', desc:'薄グレーの雲型の体に黄緑のくちばし（三角の歯が並ぶ）と赤いハンマー型のしっぽを持つモンスター。常に怒った顔をしているが理由はない。ハンマーしっぽで地面を叩くのが習慣。', quote:'なんか腹立つ（理由なし）' },
  { id:145, file:'IMG_1608.JPG', name:'ハタフリン',   type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'黄緑のS字型の細長い体に大きな青い目（ピンクの瞳）を持ち、カラフルな旗（紫×黄ストライプ・青い山模様）を左手に持つモンスター。どこの国の旗かは知らないが振り続ける。', quote:'この旗の国、知らないけど振る' },
  { id:146, file:'IMG_1609.JPG', name:'ギザガブ',     type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'赤×オレンジのギザギザした頭部にカーキの丸いずんぐりした体、黄緑の目が特徴のモンスター。小さくて可愛いが怒るとギザギザが増えて体積が2倍になる。', quote:'ギザギザしてるから強いんだ' },
  { id:147, file:'IMG_1610.JPG', name:'スカーフスリン', type:'水', typeColor:'#0284c7', typeBg:'rgba(2,132,199,0.2)',   desc:'水色の細長い体にマゼンタの目（赤い瞳）を持ち、黄緑のチェック格子模様のスカーフをぐるぐると巻いたモンスター。スカーフを外した姿を見た者がいない。本人いわく「外したら死ぬかも」。', quote:'スカーフ外したら死ぬかも' },
  { id:148, file:'IMG_1611.JPG', name:'フタコブウマ', type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'黄土色のY字に分岐した頭（角のような形）と緑の目を持ち、赤からマゼンタへのグラデーションの体、水色のベルト、黄緑のひづめを持つ馬型モンスター。角が二股に分かれているが気持ちは一つ。', quote:'この角、分かれてるけど一つの気持ち' },
  { id:149, file:'IMG_1612.JPG', name:'ニコベジュ',   type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'ベージュのアメーバ型の体に青紫の丸い一つ目（ピンクの瞳）、マゼンタのニヤリ口に青い格子歯を持つモンスター。笑顔に見えるが実は何も感じていない。表情筋の問題。', quote:'笑ってるけど何も感じてない' },
  { id:150, file:'IMG_1613.JPG', name:'ボウサシン',   type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'マゼンタのぼてっとした体に、青×金の複雑な模様の目（緑の瞳）と金色の横棒が頭に刺さったモンスター。小さな緑の口がついている。頭の棒は最初からあったと本人は言う。', quote:'この棒？最初からあった' },
  { id:151, file:'IMG_1614.JPG', name:'ベロベロン',   type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'緑のゴースト型モンスター。紫の一つ目（赤×黄の虹彩）、赤×黄のギザギザ歯の口から紫の長い舌をだらりと垂らしている。舌が長いと何かと便利だと力説する。', quote:'舌が長いと有利なんだよ' },
  { id:152, file:'IMG_1615.JPG', name:'ミントケラ',   type:'草',  typeColor:'#16a34a', typeBg:'rgba(22,163,74,0.2)',    desc:'ミントグリーンのトリケラトプス型モンスター。グレーの背面模様、ピンクの一つ目、黄緑のひづめ、ピンク×黄の三日月型の角が2本生えている。優しい目をしているが突進を始めると誰も止められない。', quote:'この角、三日月みたいでしょ' },
  { id:153, file:'IMG_8014.PNG', name:'シランペン',   type:'光',  typeColor:'#ca8a04', typeBg:'rgba(202,138,4,0.2)',    desc:'黄色い丸いペンギン型モンスター。ピンクの王冠型のとさか、赤い口、水色の服と黄色い胸飾り、青い羽と足が特徴。いつも「まじでしらんで」と言うが実は全部知っている。', quote:'まじでしらんで…（本当は知ってる）' },
  { id:154, file:'IMG_8015.PNG', name:'シランクン',   type:'炎',  typeColor:'#ea580c', typeBg:'rgba(234,88,12,0.2)',    desc:'赤い体に緑の大きな帽子をかぶり、タバコをくわえたモンスター。知らないことについて自信満々に語る。「そいつが知らねえよ」と言いながら自分が一番知らない。', quote:'そいつが知らねえよ（自分もだけど）' },
  { id:155, file:'IMG_8016.PNG', name:'シランケモン', type:'霊',  typeColor:'#9333ea', typeBg:'rgba(147,51,234,0.25)',  desc:'紫のぽっちゃりした体に青いゴーグルをかけ、ピンクの扇子を持ち、大きな黒いバッグを提げたモンスター。オレンジのお腹と触角が特徴。何を聞いても「まあ、しらんけどな」で返す。', quote:'まあ、しらんけどな…（扇子パタパタ）' },

let currentIndex = 0;
let isAnimating = false;
const IMG_BASE = 'images/ファニーモンスター/';

// ===== パーティクル生成 =====
const particleContainer = document.getElementById('particles');
for (let i = 0; i < 40; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${60 + Math.random()*40}%;
    animation: float-particle ${4 + Math.random()*6}s ${Math.random()*8}s ease-in-out infinite;
    opacity: 0;
  `;
  // 色をランダムに
  const colors = ['#a78bfa','#60a5fa','#f472b6','#34d399','#fbbf24'];
  p.style.background = colors[Math.floor(Math.random()*colors.length)];
  particleContainer.appendChild(p);
}

// ===== リスト生成 =====
const listEl = document.getElementById('monsterList');
MONSTERS.forEach((m, i) => {
  const item = document.createElement('div');
  item.className = 'monster-item flex items-center gap-3 px-3 py-2.5';
  item.dataset.index = i;
  item.innerHTML = `
    <span class="num pixel text-[8px] text-purple-700 w-8 shrink-0">
      ${String(m.id).padStart(3,'0')}
    </span>
    <div class="thumb-wrap w-10 h-10 rounded-lg overflow-hidden bg-white shrink-0 flex items-center justify-center transition-all duration-300">
      <img src="${IMG_BASE}${m.file}" alt="${m.name}"
           class="w-full h-full object-contain" style="mix-blend-mode:multiply;" loading="lazy" />
    </div>
    <span class="text-sm font-bold text-slate-300 truncate">${m.name}</span>
    <span class="ml-auto shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded-full"
          style="background:${m.typeBg};color:${m.typeColor};">${m.type}</span>
  `;
  item.addEventListener('click', () => selectMonster(i));
  listEl.appendChild(item);
});

// ===== タイプライター =====
function typewriterEffect(el, text) {
  el.innerHTML = '';
  [...text].forEach((char, i) => {
    const span = document.createElement('span');
    span.className = 'typewriter-char';
    span.textContent = char;
    span.style.animationDelay = `${i * 60}ms`;
    el.appendChild(span);
  });
}

// ===== 衝撃波 =====
function triggerShockwave() {
  ['sw1','sw2','sw3'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'shockwave';
    void el.offsetWidth;
    el.className = `shockwave ring${id.slice(-1)}`;
  });
}

// ===== フラッシュ =====
function triggerFlash() {
  const flash = document.getElementById('flash');
  flash.classList.remove('flashing');
  void flash.offsetWidth;
  flash.classList.add('flashing');
}

// ===== 説明文アニメーション =====
function animateDesc(text) {
  const el = document.getElementById('detailDesc');
  // 句点で区切って段落的に扱う
  const sentences = text.match(/[^。]+。?/g) || [text];
  el.innerHTML = sentences.map(s =>
    `<span class="desc-line">${s}</span>`
  ).join('');
  const lines = el.querySelectorAll('.desc-line');
  lines.forEach((line, i) => {
    setTimeout(() => line.classList.add('visible'), 300 + i * 120);
  });
}

// ===== メイン選択関数 =====
function selectMonster(index) {
  if (isAnimating) return;
  isAnimating = true;
  currentIndex = index;
  const m = MONSTERS[index];

  // リストアクティブ
  document.querySelectorAll('.monster-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.monster-item[data-index="${index}"]`).classList.add('active');

  // フラッシュ
  triggerFlash();

  // 詳細パネル表示
  document.getElementById('emptyState').style.display = 'none';
  const detail = document.getElementById('detailContent');
  detail.classList.remove('hidden');

  // 番号（即時）
  document.getElementById('detailNo').textContent = `No.${String(m.id).padStart(3,'0')}`;

  // タイプバッジ（バウンス）
  const typeEl = document.getElementById('detailType');
  typeEl.className = 'type-badge';
  void typeEl.offsetWidth;
  typeEl.textContent = m.type + 'タイプ';
  typeEl.style.background = m.typeBg;
  typeEl.style.color = m.typeColor;
  typeEl.style.border = `1px solid ${m.typeColor}55`;
  typeEl.classList.add('badge-enter');

  // 名前タイプライター（少し遅延）
  setTimeout(() => typewriterEffect(document.getElementById('detailName'), m.name), 80);

  // 画像（バウンス登場）
  const img = document.getElementById('detailImg');
  img.style.animation = 'none';
  img.style.opacity = '0';
  img.src = IMG_BASE + m.file;
  img.alt = m.name;
  setTimeout(() => {
    img.classList.remove('img-entering');
    void img.offsetWidth;
    img.classList.add('img-entering');
    img.style.opacity = '';
    // 登場後は浮遊アニメに戻す
    setTimeout(() => {
      img.classList.remove('img-entering');
      img.style.animation = '';
    }, 500);
    triggerShockwave();
  }, 100);

  // 説明文（時間差フェード）
  animateDesc(m.desc);

  // セリフ
  const quoteEl = document.getElementById('detailQuote');
  quoteEl.textContent = m.quote;
  quoteEl.classList.remove('visible');
  setTimeout(() => quoteEl.classList.add('visible'), 600);

  // スクロール
  const activeItem = document.querySelector('.monster-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // モバイル：詳細パネルをスライドイン
  if (isMobile()) showMobileDetail();

  setTimeout(() => { isAnimating = false; }, 400);
}

function navigatePrev() { if (currentIndex > 0) selectMonster(currentIndex - 1); }
function navigateNext() { if (currentIndex < MONSTERS.length - 1) selectMonster(currentIndex + 1); }

// ===== モバイルビュー切り替え =====
function isMobile() { return window.innerWidth < 768; }

function showMobileDetail() {
  document.getElementById('detailPanel').classList.add('mobile-open');
  // 一覧側のスクロールを止める
  document.getElementById('monsterList').style.overflow = 'hidden';
}

function showMobileList() {
  document.getElementById('detailPanel').classList.remove('mobile-open');
  document.getElementById('monsterList').style.overflow = 'auto';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')   { e.preventDefault(); navigatePrev(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); navigateNext(); }
});

selectMonster(0);
</script>
</body>
</html>
