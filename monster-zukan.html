<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ファニーモンスター図鑑 | 劇団FAX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #0b0118; }
    .pixel { font-family: 'Press Start 2P', monospace; }

    /* スキャンライン */
    .scanlines::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* 左パネルスクロール */
    .list-panel {
      background: linear-gradient(180deg, #110126 0%, #0d011e 100%);
      border-right: 1px solid rgba(139, 92, 246, 0.3);
    }
    .list-panel::-webkit-scrollbar { width: 4px; }
    .list-panel::-webkit-scrollbar-track { background: #0d011e; }
    .list-panel::-webkit-scrollbar-thumb { background: #6d28d9; border-radius: 2px; }

    /* モンスターカード（左リスト） */
    .monster-item {
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
      cursor: pointer;
    }
    .monster-item:hover {
      background: rgba(109, 40, 217, 0.2);
      border-left-color: rgba(139, 92, 246, 0.5);
    }
    .monster-item.active {
      background: rgba(109, 40, 217, 0.35);
      border-left-color: #a78bfa;
    }
    .monster-item.active .num { color: #a78bfa; }

    /* 右パネル */
    .detail-panel {
      background: radial-gradient(ellipse at 30% 20%, #1e0a3c 0%, #0b0118 60%);
    }

    /* 図鑑番号 */
    .zukan-no {
      font-family: 'Press Start 2P', monospace;
      color: rgba(167, 139, 250, 0.5);
      letter-spacing: 0.1em;
    }

    /* モンスター名 */
    .monster-name {
      text-shadow: 0 0 30px rgba(167,139,250,0.5);
    }

    /* タイプバッジ */
    .type-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* 画像コンテナ */
    .img-container {
      position: relative;
      background: radial-gradient(ellipse at center, rgba(139,92,246,0.15) 0%, transparent 70%);
      border-radius: 24px;
    }
    .img-container::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(139,92,246,0.4), rgba(59,130,246,0.2), rgba(139,92,246,0.1));
      z-index: 0;
    }
    .img-container img {
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
      mix-blend-mode: multiply;
    }
    .img-container:hover img { transform: scale(1.05) rotate(-1deg); }

    /* セリフバブル */
    .speech-bubble {
      position: relative;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.4);
      border-radius: 16px;
    }
    .speech-bubble::before {
      content: '"';
      position: absolute;
      top: -2px;
      left: 14px;
      font-size: 3rem;
      color: rgba(139,92,246,0.3);
      line-height: 1;
    }

    /* フェードイン */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.3s ease forwards; }

    /* グロー点滅 */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(167,139,250,0.3); }
      50% { box-shadow: 0 0 24px rgba(167,139,250,0.7), 0 0 48px rgba(109,40,217,0.3); }
    }
    .glow-box { animation: glow-pulse 3s ease-in-out infinite; }

    /* ヘッダー */
    header {
      background: rgba(11,1,24,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,92,246,0.25);
    }

    /* 説明文グラスカード */
    .glass-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius: 16px;
    }
  </style>
</head>
<body class="scanlines min-h-screen text-white">

<!-- ヘッダー -->

      </div>

      <!-- ナビゲーション -->

        <button onclick="navigatePrev()" class="flex items-center gap-2 text-xs text-purple-500 hover:text-purple-300 transition-colors pixel">← PREV</button>

    </div>
  </div>
</div>

    id: 30, file: 'IMG_1161.JPG',
    name: 'アカトリ',
    type: '炎', typeColor: '#ea580c', typeBg: 'rgba(234,88,12,0.2)',
    desc: '赤と黄色の鳥モンスター。大きなくちばし、緑の首周り、カラフルな脚が特徴。ダンスが得意で、リズムに乗りながら歩く。踊らない日はないと本人が言っている。',
    quote: '踊らにゃ損、損！'
  },
];

let currentIndex = 0;
const IMG_BASE = 'images/ファニーモンスター/';

// リスト生成
const listEl = document.getElementById('monsterList');
MONSTERS.forEach((m, i) => {
  const item = document.createElement('div');
  item.className = 'monster-item flex items-center gap-3 px-3 py-2.5';
  item.dataset.index = i;
  item.innerHTML = `
    <span class="num pixel text-[8px] text-purple-700 w-8 shrink-0">No.${String(m.id).padStart(3,'0')}</span>
    <div class="w-10 h-10 rounded-lg overflow-hidden bg-white/5 shrink-0 flex items-center justify-center">
      <img src="${IMG_BASE}${m.file}" alt="${m.name}" class="w-full h-full object-contain" style="mix-blend-mode:multiply;" loading="lazy" />
    </div>
    <span class="text-sm font-bold text-slate-300 truncate">${m.name}</span>
    <span class="ml-auto shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded-full" style="background:${m.typeBg};color:${m.typeColor};">${m.type}</span>
  `;
  item.addEventListener('click', () => selectMonster(i));
  listEl.appendChild(item);
});

function selectMonster(index) {
  currentIndex = index;
  const m = MONSTERS[index];

  // リストのアクティブ状態
  document.querySelectorAll('.monster-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.monster-item[data-index="${index}"]`).classList.add('active');

  // 詳細更新
  document.getElementById('emptyState').classList.add('hidden');
  const detail = document.getElementById('detailContent');
  detail.classList.remove('hidden');
  detail.classList.remove('fade-in');
  void detail.offsetWidth; // reflow
  detail.classList.add('fade-in');

  document.getElementById('detailNo').textContent = `No.${String(m.id).padStart(3,'0')}`;
  document.getElementById('detailName').textContent = m.name;
  document.getElementById('detailImg').src = IMG_BASE + m.file;
  document.getElementById('detailImg').alt = m.name;
  document.getElementById('detailDesc').textContent = m.desc;
  document.getElementById('detailQuote').textContent = m.quote;

  const typeEl = document.getElementById('detailType');
  typeEl.textContent = m.type + 'タイプ';
  typeEl.style.background = m.typeBg;
  typeEl.style.color = m.typeColor;
  typeEl.style.border = `1px solid ${m.typeColor}55`;

  // スクロールして選択中アイテムを見える位置に
  const activeItem = document.querySelector('.monster-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function navigatePrev() {
  if (currentIndex > 0) selectMonster(currentIndex - 1);
}
function navigateNext() {
  if (currentIndex < MONSTERS.length - 1) selectMonster(currentIndex + 1);
}

// キーボード操作
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { e.preventDefault(); navigatePrev(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); navigateNext(); }
});

// 最初の1体を選択
selectMonster(0);
</script>
</body>
</html>
